<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acquia Portal Embed — Demo</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      margin:0;color:#1c2b24;background:#f4f6f5;}
    .page{max-width:1200px;margin:0 auto;padding:32px 20px 64px;}
    h1{font-size:28px;margin:0 0 4px;}
    .sub{color:#5a6b63;margin:0 0 28px;}
    .note{background:#e9f0ec;border:1px solid #d3e0d9;border-radius:8px;padding:12px 16px;
      font-size:14px;color:#33473d;margin:0 0 24px;}
    code{background:#e4ebe7;padding:2px 6px;border-radius:4px;font-size:13px;}
  </style>
</head>
<body>
  <div class="page">
    <h1>Press Center — Gallery Portal</h1>
    <p class="sub">Live embed of the Acquia DAM press portal. Click any gallery to browse and download.</p>

    <div class="note">
      This is a working demo. The embed below is generated by
      <code>acquia-portal-embed.js</code> from the <code>data-*</code> attributes on the script tag.
      Swap <code>data-portal-url</code> to point at any Acquia DAM portal.
    </div>

    <!-- ==================================================================
         THE EMBED — this is the only thing you paste into your CMS.
         Point data-portal-url at your portal. Everything else is optional.
         ================================================================== -->
    <script
      src="./acquia-portal-embed.js"
      data-portal-url="https://trlibrary.acquiadam.com/portals/ob41lpui/PressPortal"
      data-height="responsive"
      data-min-height="720"
      data-max-height="1500"
      data-embedded="true"></script>
    <!-- ================================================================== -->

  </div>
</body>
</html>
